<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>La Bonne Fourchette</title>

  <script>
    const APP_VERSION = '1.2.11';

    function getBasePath() {
      const path = window.location.pathname;
      return path.endsWith('/') ? path.slice(0, -1) : path.substring(0, path.lastIndexOf('/'));
    }

    const BASE_PATH = getBasePath();
    const MANIFEST_URL = `${BASE_PATH}/manifest.webmanifest?v=${APP_VERSION}`;
    const ICON_192_URL = `${BASE_PATH}/icon-192.png`;
    const SW_URL = `${BASE_PATH}/sw.js?v=${APP_VERSION}`;
  </script>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://i.postimg.cc" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script>
    document.write(`<link rel="manifest" href="${MANIFEST_URL}">`);
    document.write(`<link rel="apple-touch-icon" href="${ICON_192_URL}">`);
  </script>

  <meta name="theme-color" content="#0F0F0F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="La Bonne Fourchette">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#F2C744',
            goldDark: '#D4A820',
            dark: '#0F0F0F',
            darkCard: '#1A1A1A',
            cream: '#FAF6EE',
            belgianRed: '#EF3340'
          }
        }
      }
    }
  </script>

  <style>
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #0F0F0F;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      background: #0F0F0F;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    * {
      box-sizing: border-box;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    .font-body { font-family: 'DM Sans', 'Helvetica Neue', sans-serif; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-up {
      animation: fadeUp 0.15s ease-out forwards;
      opacity: 0;
      will-change: opacity, transform;
    }

    .delay-1 { animation-delay: 0.01s; }
    .delay-2 { animation-delay: 0.02s; }
    .delay-3 { animation-delay: 0.03s; }
    .delay-4 { animation-delay: 0.04s; }
    .delay-5 { animation-delay: 0.05s; }
    .delay-6 { animation-delay: 0.06s; }

    .menu-category { scroll-margin-top: 90px; }

    .btn-action {
      transition: transform 0.15s ease-out, box-shadow 0.15s ease-out, background 0.15s ease-out, border-color 0.15s ease-out;
      will-change: transform;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }

    .btn-action:active {
      transform: scale(0.97);
    }

    .diamond-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 0;
    }

    .diamond-divider span {
      width: 6px;
      height: 6px;
      background: #F2C744;
      transform: rotate(45deg);
      display: inline-block;
    }

    .diamond-divider span:nth-child(2) {
      width: 8px;
      height: 8px;
    }

    .desktop-lux-divider {
      display: none;
    }

    .menu-item-row {
      transition: background 0.15s ease-out;
      -webkit-user-select: none;
      user-select: none;
    }

    .menu-item-row:active {
      background: rgba(242, 199, 68, 0.08);
    }

    .language-selector {
      position: fixed;
      top: 16px;
      right: 20px;
      display: flex;
      gap: 8px;
      z-index: 50;
      background: rgba(26, 26, 26, 0.92);
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(242, 199, 68, 0.30);
      max-width: calc(100vw - 24px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      pointer-events: none;
    }

    .lang-btn {
      min-width: 48px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid rgba(242, 199, 68, 0.18);
      border-radius: 8px;
      transition: all 0.15s ease-out;
      background: rgba(255,255,255,0.01);
      padding: 0 10px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      color: rgba(250, 246, 238, 0.72);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      will-change: transform, border-color, background, box-shadow;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      flex-shrink: 0;
      pointer-events: auto;
      touch-action: manipulation;
    }

    .lang-btn:hover {
      border-color: rgba(242, 199, 68, 0.45);
      background: rgba(242, 199, 68, 0.08);
      color: rgba(250, 246, 238, 0.96);
    }

    .lang-btn.active {
      border-color: #F2C744;
      background: rgba(242, 199, 68, 0.18);
      color: #F2C744;
      box-shadow: 0 0 12px rgba(242, 199, 68, 0.15);
    }

    .lang-btn:active {
      transform: scale(0.95);
    }

    .lang-label {
      display: inline-block;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .lang-flag {
      display: none;
      font-size: 22px;
      line-height: 1;
    }

    .menu-item-subtitle {
      font-size: 0.75rem;
      color: rgba(250, 246, 238, 0.6);
      font-style: italic;
      margin-top: 2px;
      line-height: 1.35;
    }

    .icon-red {
      color: #EF3340;
      stroke: #EF3340;
    }

    .icon-gold {
      color: #F2C744;
      stroke: #F2C744;
    }

    .brand-card {
      width: 100%;
      max-width: 360px;
    }

    .install-toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translate(-50%, 20px);
      width: calc(100% - 24px);
      max-width: 420px;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .install-toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .install-help-box {
      margin-top: 8px;
      padding: 18px 18px 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 2px solid rgba(242, 199, 68, 0.28);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    }

    .install-help-title {
      font-size: 1.2rem;
      line-height: 1.3;
      font-weight: 800;
      color: #FAF6EE;
      text-align: center;
      margin-bottom: 16px;
    }

    .install-help-step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 1.02rem;
      line-height: 1.45;
      color: rgba(250, 246, 238, 0.92);
    }

    .install-help-step strong {
      color: #F2C744;
      font-weight: 800;
    }

    .install-help-num {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(242, 199, 68, 0.16);
      border: 1px solid rgba(242, 199, 68, 0.38);
      color: #F2C744;
      font-weight: 800;
      font-size: 0.98rem;
      margin-top: 1px;
    }

    .install-help-note {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(242, 199, 68, 0.18);
      font-size: 1rem;
      line-height: 1.45;
      color: rgba(250, 246, 238, 0.88);
      text-align: center;
      font-weight: 600;
    }

    .desktop-story-wrap {
      max-width: 1240px;
      margin: 0 auto;
    }

    .desktop-story-card {
      background:
        radial-gradient(circle at top left, rgba(242,199,68,.12), transparent 35%),
        linear-gradient(180deg, rgba(255,255,255,.038), rgba(255,255,255,.015));
      border: 1px solid rgba(242,199,68,.20);
      box-shadow: 0 28px 74px rgba(0,0,0,.36);
      backdrop-filter: blur(2px);
    }

    .desktop-story-image-wrap {
      position: relative;
      min-height: 100%;
      overflow: hidden;
      background: #111;
    }

    .desktop-story-image {
      min-height: 470px;
      object-fit: cover;
      width: 100%;
      height: 100%;
      transform: scale(1.015);
    }

    .desktop-story-image-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(15,15,15,.24) 0%, rgba(15,15,15,.10) 30%, rgba(15,15,15,.28) 100%),
        linear-gradient(180deg, rgba(0,0,0,.07) 0%, rgba(0,0,0,.24) 100%);
      pointer-events: none;
    }

    .desktop-story-kicker {
      color: rgba(242,199,68,.92);
      letter-spacing: .20em;
      text-transform: uppercase;
      font-size: .78rem;
      font-weight: 700;
    }

    .desktop-story-text {
      color: rgba(250,246,238,.82);
      line-height: 1.85;
      font-size: 1rem;
    }

    .desktop-story-signature {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 0;
      margin-bottom: 24px;
      color: rgba(250,246,238,.52);
      font-size: .86rem;
      letter-spacing: .03em;
    }

    .desktop-story-signature::before {
      content: "";
      width: 34px;
      height: 1px;
      background: rgba(242,199,68,.30);
      display: inline-block;
    }

    .desktop-story-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 24px;
      border-radius: 14px;
      border: 2px solid rgba(242,199,68,.72);
      background: linear-gradient(180deg, rgba(242,199,68,.24), rgba(242,199,68,.12));
      color: #FAF6EE;
      font-weight: 700;
      letter-spacing: .03em;
      box-shadow: 0 16px 30px rgba(0,0,0,.24), 0 0 0 1px rgba(242,199,68,.12) inset;
      transition: transform .15s ease-out, border-color .15s ease-out, background .15s ease-out, box-shadow .15s ease-out;
      user-select: none;
      -webkit-user-select: none;
    }

    .desktop-story-cta:hover {
      border-color: #F2C744;
      background: linear-gradient(180deg, rgba(242,199,68,.30), rgba(242,199,68,.16));
      box-shadow: 0 20px 36px rgba(0,0,0,.28), 0 0 0 1px rgba(242,199,68,.18) inset;
      transform: translateY(-1px);
    }

    .desktop-story-cta:active {
      transform: scale(0.98);
    }

    .allergen-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .allergen-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border: 1px solid rgba(255,255,255,.08);
    }

    .allergen-icon-wrap {
      width: 50px;
      height: 50px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: rgba(255,255,255,.02);
      border: 2px solid currentColor;
    }

    .allergen-icon-wrap svg {
      width: 28px;
      height: 28px;
      display: block;
    }

    .allergen-label {
      font-size: 0.92rem;
      line-height: 1.3;
      color: rgba(250, 246, 238, 0.9);
      font-weight: 600;
    }

    .allergen-legal-box {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border: 1px solid rgba(242,199,68,.18);
    }

    .allergen-legal-text {
      font-size: 0.92rem;
      line-height: 1.65;
      color: rgba(250,246,238,.78);
    }

    .allergen-subtitle {
      font-size: 0.78rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(242,199,68,.78);
      font-weight: 700;
      margin-bottom: 12px;
    }

    @media (min-width: 768px) {
      .allergen-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (min-width: 1024px) {
      .desktop-lux-divider {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 10px 0 18px;
      }

      .desktop-lux-divider-line {
        width: 120px;
        height: 1px;
        background: linear-gradient(90deg, rgba(242,199,68,0), rgba(242,199,68,.45), rgba(242,199,68,0));
      }

      .desktop-lux-divider-dots {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .desktop-lux-divider-dots span {
        width: 6px;
        height: 6px;
        background: rgba(242,199,68,.9);
        transform: rotate(45deg);
        display: inline-block;
      }

      .desktop-lux-divider-dots span:nth-child(2) {
        width: 8px;
        height: 8px;
      }

      .allergen-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .language-selector {
        top: 10px;
        right: 10px;
        left: 10px;
        justify-content: center;
        padding: 8px 10px;
      }

      .lang-btn {
        min-width: 44px;
        height: 42px;
        padding: 0 8px;
      }

      .lang-label {
        display: none;
      }

      .lang-flag {
        display: inline-block;
      }

      .brand-card {
        max-width: 100%;
      }

      .install-help-box {
        padding: 18px 16px 16px;
        border-radius: 16px;
      }

      .install-help-title {
        font-size: 1.24rem;
      }

      .install-help-step {
        font-size: 1.06rem;
      }

      .install-help-note {
        font-size: 1.02rem;
      }

      .allergen-card {
        padding: 10px 12px;
      }

      .allergen-icon-wrap {
        width: 44px;
        height: 44px;
      }

      .allergen-icon-wrap svg {
        width: 24px;
        height: 24px;
      }

      .allergen-label {
        font-size: 0.86rem;
      }
    }
  </style>

  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

    const supportedLangs = ['fr', 'es', 'en', 'nl'];

    function detectLanguage() {
      const browserLang = (navigator.language || navigator.userLanguage || 'es').substring(0, 2).toLowerCase();
      return supportedLangs.includes(browserLang) ? browserLang : 'es';
    }

let currentLang = detectLanguage();
let deferredInstallPrompt = null;
let installToastTimeout = null;
let installFallbackTimeout = null;
let installToastAlreadyShown = false;

    function isIos() {
      return /iphone|ipad|ipod/i.test(window.navigator.userAgent);
    }

    function isSamsungInternet() {
      return /SamsungBrowser/i.test(window.navigator.userAgent || '');
    }

    function isInStandaloneMode() {
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    }

    function updateLangButtons() {
      document.querySelectorAll('.lang-btn').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
      });
    }

    function updateInstallUI() {
      const installBtn = document.getElementById('install-app-btn');
      const iosHelp = document.getElementById('ios-install-help');
      const t = translations[currentLang];

      if (!installBtn) return;

      if (isInStandaloneMode()) {
        installBtn.hidden = true;
        if (iosHelp) iosHelp.hidden = true;
        return;
      }

      if (isSamsungInternet()) {
        installBtn.hidden = false;
        installBtn.querySelector('span').textContent = t.installApp;

        if (iosHelp) {
          iosHelp.hidden = true;
          iosHelp.innerHTML = t.samsungInstallHelp;
        }
        return;
      }

      if (deferredInstallPrompt || isIos()) {
        installBtn.hidden = false;
        installBtn.querySelector('span').textContent = t.installApp;
      } else {
        installBtn.hidden = true;
      }

      if (iosHelp) {
        iosHelp.hidden = true;
      }
    }

    function showInstallToast() {
      if (installToastAlreadyShown) return;

      const toast = document.getElementById('install-toast');
      const title = document.getElementById('install-toast-title');
      const text = document.getElementById('install-toast-text');
      const t = translations[currentLang];

      if (!toast || !title || !text) return;

      installToastAlreadyShown = true;
      title.textContent = t.installToastTitle;
      text.textContent = t.installToastText;
      toast.classList.add('show');

      if (window.lucide) {
        requestAnimationFrame(() => {
          lucide.createIcons();
        });
      }

      clearTimeout(installToastTimeout);
      installToastTimeout = setTimeout(() => {
        toast.classList.remove('show');
        installToastAlreadyShown = false;
      }, 3200);
    }

    async function handleInstallClick() {
      const iosHelp = document.getElementById('ios-install-help');
      const t = translations[currentLang];

      if (isSamsungInternet()) {
        if (iosHelp) {
          if (!iosHelp.hidden) {
            clearTimeout(installHelpTimeout);
            iosHelp.hidden = true;
            return;
          }

          clearTimeout(installHelpTimeout);
          iosHelp.hidden = false;
          iosHelp.innerHTML = t.samsungInstallHelp;
          iosHelp.scrollIntoView({ behavior: 'smooth', block: 'center' });

          installHelpTimeout = setTimeout(() => {
            iosHelp.hidden = true;
          }, 15000);
        }
        return;
      }

      if (deferredInstallPrompt) {
        installToastAlreadyShown = false;
        deferredInstallPrompt.prompt();

        try {
          const choiceResult = await deferredInstallPrompt.userChoice;

          if (choiceResult && choiceResult.outcome === 'accepted') {
            clearTimeout(installFallbackTimeout);
            installFallbackTimeout = setTimeout(() => {
              if (isInStandaloneMode()) {
                showInstallToast();
              }
            }, 1200);
          }
        } catch (_) {}

        deferredInstallPrompt = null;
        updateInstallUI();
        return;
      }

      if (isIos() && !isInStandaloneMode()) {
        if (iosHelp) {
          if (!iosHelp.hidden) {
            clearTimeout(installHelpTimeout);
            iosHelp.hidden = true;
            return;
          }

          clearTimeout(installHelpTimeout);
          iosHelp.hidden = false;
          iosHelp.innerHTML = t.iosInstallHelp;
          iosHelp.scrollIntoView({ behavior: 'smooth', block: 'center' });

          installHelpTimeout = setTimeout(() => {
            iosHelp.hidden = true;
          }, 15000);
        }
      }
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;

      if (!isSamsungInternet()) {
        updateInstallUI();
      }
    });

      clearTimeout(installFallbackTimeout);
      deferredInstallPrompt = null;

let hasReloadedForNewSW = false;

async function registerFreshServiceWorker() {
  if (!('serviceWorker' in navigator)) return;

  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (hasReloadedForNewSW) return;
    hasReloadedForNewSW = true;
    window.location.reload();
  });

  try {
    const registration = await navigator.serviceWorker.register(SW_URL, {
      scope: `${BASE_PATH}/`,
      updateViaCache: 'none'
    });

    if (registration) {
      await registration.update();

      if (registration.waiting) {
        registration.waiting.postMessage({ type: 'SKIP_WAITING' });
      }

      registration.addEventListener('updatefound', () => {
        const newWorker = registration.installing;
        if (!newWorker) return;

        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            newWorker.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
    }
  } catch (err) {
    console.error('SW registration error:', err);
  }
}

document.addEventListener('DOMContentLoaded', async () => {


  await registerFreshServiceWorker();

  renderMenu();

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const lang = e.currentTarget.dataset.lang;
      if (!supportedLangs.includes(lang)) return;

      currentLang = lang;
      renderMenu();
      window.scrollTo({ top: 0, behavior: 'auto' });
    });
  });
});
