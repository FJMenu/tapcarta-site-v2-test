:root{--bg:#12100b;--card:#1c1810;--card2:#241f15;--text:#fff8e6;--muted:#c9b98a;--gold:#ffc51b;--line:rgba(255,197,27,.22);--shadow:0 24px 80px rgba(0,0,0,.35);--radius:24px;--max:1040px}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 20% 0%,rgba(255,197,27,.12),transparent 34%),radial-gradient(circle at 90% 20%,rgba(255,197,27,.08),transparent 32%),var(--bg);color:var(--text);line-height:1.65}a{color:inherit}.container{width:min(var(--max),calc(100% - 32px));margin:auto}header{position:sticky;top:0;z-index:10;backdrop-filter:blur(16px);background:rgba(18,16,11,.82);border-bottom:1px solid rgba(255,197,27,.12)}.nav{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:18px 0}.brand{display:flex;align-items:center;gap:12px;text-decoration:none;font-weight:900;letter-spacing:.2px}.brand-mark{width:38px;height:38px;border-radius:14px;background:linear-gradient(135deg,#ffc51b,#ffdd65);color:#171107;display:grid;place-items:center;font-weight:1000;box-shadow:0 12px 30px rgba(255,197,27,.18)}.lang{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.lang button{border:1px solid rgba(255,197,27,.22);background:rgba(255,255,255,.04);color:var(--muted);border-radius:999px;padding:8px 11px;cursor:pointer;font-weight:800}.lang button.active{background:var(--gold);color:#1b1307;border-color:var(--gold)}main{padding:54px 0 64px}.hero{padding:34px;border-radius:var(--radius);background:linear-gradient(180deg,rgba(255,197,27,.10),rgba(255,255,255,.035));border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:24px}.eyebrow{color:var(--gold);font-weight:900;text-transform:uppercase;letter-spacing:.08em;font-size:13px;margin-bottom:10px}h1{margin:0;font-size:clamp(32px,5vw,56px);line-height:1.05;letter-spacing:-.04em}h1 span{color:var(--gold)}.intro{max-width:760px;color:var(--muted);font-size:18px;margin:18px 0 0}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:26px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 18px;border-radius:999px;border:1px solid rgba(255,197,27,.24);text-decoration:none;font-weight:900;color:var(--text);background:rgba(255,255,255,.045)}.btn.primary{background:var(--gold);color:#1b1307;border-color:var(--gold);box-shadow:0 16px 38px rgba(255,197,27,.16)}.grid{display:grid;grid-template-columns:1fr;gap:18px}.card{border:1px solid rgba(255,197,27,.16);background:rgba(255,255,255,.045);border-radius:22px;padding:24px}h2{color:var(--gold);margin:0 0 12px;font-size:22px;letter-spacing:-.02em}p{margin:0 0 12px;color:var(--muted)}ul{margin:0;padding-left:20px;color:var(--muted)}li{margin:6px 0}.note{margin-top:18px;padding:16px;border-radius:18px;border:1px solid rgba(255,197,27,.22);background:rgba(255,197,27,.075);color:#ffe7a3;font-weight:750}.legal-links{display:flex;gap:18px;flex-wrap:wrap}footer{border-top:1px solid rgba(255,197,27,.12);padding:24px 0;color:var(--muted);font-size:14px}.footer-row{display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap}@media(max-width:640px){.nav{align-items:flex-start;flex-direction:column}.lang{justify-content:flex-start}.hero,.card{padding:22px}.btn{width:100%}.footer-row{display:grid}.legal-links{display:grid;gap:10px}}
</style>

    const translations = {"fr": {"eyebrow": "Mentions légales", "title": "Mentions légales <span>TapCarta</span>", "intro": "Informations légales relatives à l’éditeur du site. Version informative : en cas de divergence, la version espagnole prévaut.", "sections": [{"title": "1. Éditeur du site", "body": "<p>TapCarta<br>Nombre comercial explotado por: Fabian Pierre J. Jodogne<br>NIE: Y6319821X<br>Dirección: Calle Gades 2 PBJ 2-3 blq B, 29692 Manilva (Málaga), España<br>Email: <a href=\"mailto:contact@tapcarta.com\">contact@tapcarta.com</a></p>"}, {"title": "2. Activité", "body": "<p>TapCarta est une solution SaaS destinée aux établissements de restauration : menu digital, QR code, site web, réservation, commande et services associés.</p>"}, {"title": "3. Accès au site", "body": "<p>L’accès au site est libre. L’utilisateur s’engage à utiliser le site conformément à la législation applicable et aux présentes mentions.</p>"}, {"title": "4. Propriété intellectuelle", "body": "<p>La structure, les textes, visuels, logos, interfaces, concepts et éléments techniques du site TapCarta sont protégés. Toute reproduction ou utilisation non autorisée est interdite.</p>"}, {"title": "5. Responsabilité", "body": "<p>TapCarta met en œuvre des efforts raisonnables pour maintenir les informations du site à jour, sans garantir l’absence totale d’erreur ou d’interruption temporaire.</p>"}, {"title": "6. Données et cookies", "body": "<p>Les données personnelles et cookies sont encadrés par la Politique de confidentialité.</p>"}, {"title": "7. Droit applicable", "body": "<p>Le site est soumis au droit espagnol. Pour tout litige, les parties se soumettent aux Juzgados y Tribunales de Málaga.</p>"}]}, "es": {"eyebrow": "Aviso legal", "title": "Aviso legal <span>TapCarta</span>", "intro": "Información legal relativa al titular del sitio. La versión española es la versión de referencia.", "sections": [{"title": "1. Titular del sitio", "body": "<p>TapCarta<br>Nombre comercial explotado por: Fabian Pierre J. Jodogne<br>NIE: Y6319821X<br>Dirección: Calle Gades 2 PBJ 2-3 blq B, 29692 Manilva (Málaga), España<br>Email: <a href=\"mailto:contact@tapcarta.com\">contact@tapcarta.com</a></p>"}, {"title": "2. Actividad", "body": "<p>TapCarta es una solución SaaS destinada a establecimientos de restauración: menú digital, código QR, sitio web, reservas, pedidos y servicios asociados.</p>"}, {"title": "3. Acceso al sitio", "body": "<p>El acceso al sitio es libre. El usuario se compromete a utilizarlo conforme a la legislación aplicable y al presente aviso legal.</p>"}, {"title": "4. Propiedad intelectual", "body": "<p>La estructura, textos, imágenes, logos, interfaces, conceptos y elementos técnicos del sitio TapCarta están protegidos. Queda prohibida cualquier reproducción o uso no autorizado.</p>"}, {"title": "5. Responsabilidad", "body": "<p>TapCarta realiza esfuerzos razonables para mantener actualizada la información del sitio, sin garantizar la ausencia total de errores o interrupciones temporales.</p>"}, {"title": "6. Datos y cookies", "body": "<p>Los datos personales y cookies se regulan en la Política de privacidad.</p>"}, {"title": "7. Ley aplicable", "body": "<p>El sitio se rige por la legislación española. Para cualquier controversia, las partes se someten a los Juzgados y Tribunales de Málaga.</p>"}]}, "en": {"eyebrow": "Legal notice", "title": "TapCarta <span>legal notice</span>", "intro": "Legal information about the website owner. Informative version: in case of discrepancy, the Spanish version prevails.", "sections": [{"title": "1. Website owner", "body": "<p>TapCarta<br>Nombre comercial explotado por: Fabian Pierre J. Jodogne<br>NIE: Y6319821X<br>Dirección: Calle Gades 2 PBJ 2-3 blq B, 29692 Manilva (Málaga), España<br>Email: <a href=\"mailto:contact@tapcarta.com\">contact@tapcarta.com</a></p>"}, {"title": "2. Activity", "body": "<p>TapCarta is a SaaS solution for restaurants: digital menu, QR code, website, bookings, orders and related services.</p>"}, {"title": "3. Website access", "body": "<p>Access to the website is free. Users agree to use it in accordance with applicable law and this legal notice.</p>"}, {"title": "4. Intellectual property", "body": "<p>The structure, texts, visuals, logos, interfaces, concepts and technical elements of TapCarta are protected. Any unauthorised reproduction or use is prohibited.</p>"}, {"title": "5. Liability", "body": "<p>TapCarta makes reasonable efforts to keep website information up to date, without guaranteeing total absence of errors or temporary interruptions.</p>"}, {"title": "6. Data and cookies", "body": "<p>Personal data and cookies are governed by the Privacy Policy.</p>"}, {"title": "7. Governing law", "body": "<p>The website is governed by Spanish law. For any dispute, the parties submit to the Courts and Tribunals of Málaga.</p>"}]}, "nl": {"eyebrow": "Wettelijke vermeldingen", "title": "Wettelijke vermeldingen <span>TapCarta</span>", "intro": "Wettelijke informatie over de eigenaar van de website. Informatieve versie: bij afwijkingen heeft de Spaanse versie voorrang.", "sections": [{"title": "1. Eigenaar van de website", "body": "<p>TapCarta<br>Nombre comercial explotado por: Fabian Pierre J. Jodogne<br>NIE: Y6319821X<br>Dirección: Calle Gades 2 PBJ 2-3 blq B, 29692 Manilva (Málaga), España<br>Email: <a href=\"mailto:contact@tapcarta.com\">contact@tapcarta.com</a></p>"}, {"title": "2. Activiteit", "body": "<p>TapCarta is een SaaS-oplossing voor horecazaken: digitaal menu, QR-code, website, reservaties, bestellingen en aanverwante diensten.</p>"}, {"title": "3. Toegang tot de website", "body": "<p>Toegang tot de website is vrij. Gebruikers verbinden zich ertoe de website te gebruiken volgens de toepasselijke wetgeving en deze vermeldingen.</p>"}, {"title": "4. Intellectuele eigendom", "body": "<p>Structuur, teksten, beelden, logo’s, interfaces, concepten en technische elementen van TapCarta zijn beschermd. Ongeoorloofde reproductie of gebruik is verboden.</p>"}, {"title": "5. Aansprakelijkheid", "body": "<p>TapCarta doet redelijke inspanningen om de informatie op de website actueel te houden, zonder volledige afwezigheid van fouten of tijdelijke onderbrekingen te garanderen.</p>"}, {"title": "6. Gegevens en cookies", "body": "<p>Persoonsgegevens en cookies worden geregeld door het Privacybeleid.</p>"}, {"title": "7. Toepasselijk recht", "body": "<p>De website wordt beheerst door Spaans recht. Voor elk geschil onderwerpen de partijen zich aan de rechtbanken van Málaga.</p>"}]}};
    const fallbackLang='es';
    function detectLanguage(){const stored=localStorage.getItem('tapcarta_lang'); if(translations[stored]) return stored; const code=(navigator.language||navigator.userLanguage||'').slice(0,2).toLowerCase(); return translations[code]?code:fallbackLang;}
    function renderSections(dict){const content=document.getElementById('content'); content.innerHTML=dict.sections.map(s=>`<article class="card"><h2>${s.title}</h2>${s.body}</article>`).join('');}
    function applyLang(lang){const dict={...common[lang],...translations[lang]}; document.documentElement.lang=lang; document.querySelectorAll('[data-i18n]').forEach(el=>{const key=el.getAttribute('data-i18n'); if(dict[key]) el.innerHTML=dict[key];}); document.querySelectorAll('.lang-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.lang===lang)); renderSections(dict); localStorage.setItem('tapcarta_lang',lang);}
    let activeLang=detectLanguage(); document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{activeLang=btn.dataset.lang;applyLang(activeLang);})); applyLang(activeLang);
  </script>
