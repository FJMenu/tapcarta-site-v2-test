  <style>
:root{--bg:#12100b;--card:#1c1810;--card2:#241f15;--text:#fff8e6;--muted:#c9b98a;--gold:#ffc51b;--line:rgba(255,197,27,.22);--shadow:0 24px 80px rgba(0,0,0,.35);--radius:24px;--max:1040px}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 20% 0%,rgba(255,197,27,.12),transparent 34%),radial-gradient(circle at 90% 20%,rgba(255,197,27,.08),transparent 32%),var(--bg);color:var(--text);line-height:1.65}a{color:inherit}.container{width:min(var(--max),calc(100% - 32px));margin:auto}header{position:sticky;top:0;z-index:10;backdrop-filter:blur(16px);background:rgba(18,16,11,.82);border-bottom:1px solid rgba(255,197,27,.12)}.nav{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:18px 0}.brand{display:flex;align-items:center;gap:12px;text-decoration:none;font-weight:900;letter-spacing:.2px}.brand-mark{width:38px;height:38px;border-radius:14px;background:linear-gradient(135deg,#ffc51b,#ffdd65);color:#171107;display:grid;place-items:center;font-weight:1000;box-shadow:0 12px 30px rgba(255,197,27,.18)}.lang{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.lang button{border:1px solid rgba(255,197,27,.22);background:rgba(255,255,255,.04);color:var(--muted);border-radius:999px;padding:8px 11px;cursor:pointer;font-weight:800}.lang button.active{background:var(--gold);color:#1b1307;border-color:var(--gold)}main{padding:54px 0 64px}.hero{padding:34px;border-radius:var(--radius);background:linear-gradient(180deg,rgba(255,197,27,.10),rgba(255,255,255,.035));border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:24px}.eyebrow{color:var(--gold);font-weight:900;text-transform:uppercase;letter-spacing:.08em;font-size:13px;margin-bottom:10px}h1{margin:0;font-size:clamp(32px,5vw,56px);line-height:1.05;letter-spacing:-.04em}h1 span{color:var(--gold)}.intro{max-width:760px;color:var(--muted);font-size:18px;margin:18px 0 0}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:26px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 18px;border-radius:999px;border:1px solid rgba(255,197,27,.24);text-decoration:none;font-weight:900;color:var(--text);background:rgba(255,255,255,.045)}.btn.primary{background:var(--gold);color:#1b1307;border-color:var(--gold);box-shadow:0 16px 38px rgba(255,197,27,.16)}.grid{display:grid;grid-template-columns:1fr;gap:18px}.card{border:1px solid rgba(255,197,27,.16);background:rgba(255,255,255,.045);border-radius:22px;padding:24px}h2{color:var(--gold);margin:0 0 12px;font-size:22px;letter-spacing:-.02em}p{margin:0 0 12px;color:var(--muted)}ul{margin:0;padding-left:20px;color:var(--muted)}li{margin:6px 0}.note{margin-top:18px;padding:16px;border-radius:18px;border:1px solid rgba(255,197,27,.22);background:rgba(255,197,27,.075);color:#ffe7a3;font-weight:750}.legal-links{display:flex;gap:18px;flex-wrap:wrap}footer{border-top:1px solid rgba(255,197,27,.12);padding:24px 0;color:var(--muted);font-size:14px}.footer-row{display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap}@media(max-width:640px){.nav{align-items:flex-start;flex-direction:column}.lang{justify-content:flex-start}.hero,.card{padding:22px}.btn{width:100%}.footer-row{display:grid}.legal-links{display:grid;gap:10px}}
</style>

<body>
  <header><div class="container nav"><a class="brand" href="index.html"><span class="brand-mark">T</span><span>TapCarta</span></a><div class="lang" aria-label="Language"><button type="button" class="lang-btn" data-lang="fr">FR</button><button type="button" class="lang-btn" data-lang="es">ES</button><button type="button" class="lang-btn" data-lang="en">EN</button><button type="button" class="lang-btn" data-lang="nl">NL</button></div></div></header>

  <script>
    const supportedLangs=['fr','es','en','nl'];
    const common={
      fr:{join:'Je rejoins TapCarta',back:'Retour au site',rights:'Tous droits réservés',legal:'Mentions légales',terms:'Conditions générales',privacy:'Confidentialité'},
      es:{join:'Me uno a TapCarta',back:'Volver al sitio',rights:'Todos los derechos reservados',legal:'Aviso legal',terms:'Condiciones generales',privacy:'Privacidad'},
      en:{join:'Join TapCarta',back:'Back to website',rights:'All rights reserved',legal:'Legal notice',terms:'Terms and conditions',privacy:'Privacy'},
      nl:{join:'Ik sluit me aan bij TapCarta',back:'Terug naar site',rights:'Alle rechten voorbehouden',legal:'Wettelijke vermeldingen',terms:'Algemene voorwaarden',privacy:'Privacy'}
    };
    const translations = {"fr": {"eyebrow": "Données personnelles", "title": "Politique de <span>confidentialité</span>", "intro": "Cette politique explique comment TapCarta collecte et utilise les données. Version informative : en cas de divergence, la version espagnole prévaut.", "sections": [{"title": "1. Responsable du traitement", "body": "<p>TapCarta<br>Nombre comercial explotado por: Fabian Pierre J. Jodogne<br>NIE: Y6319821X<br>Dirección: Calle Gades 2 PBJ 2-3 blq B, 29692 Manilva (Málaga), España<br>Email: <a href=\"mailto:contact@tapcarta.com\">contact@tapcarta.com</a></p>"}, {"title": "2. Données collectées", "body": "<p>TapCarta peut collecter : nom, prénom, email, téléphone/WhatsApp, langue préférée, nom commercial, adresse, ville, pays, rôle du demandeur, données fiscales ou de facturation, offre souhaitée, besoins, message libre, informations de menu, logo et éléments transmis pour la mise en service.</p>"}, {"title": "3. Finalités", "body": "<ul><li>répondre aux demandes et préparer le dossier ;</li><li>créer et gérer l’espace TapCarta ;</li><li>préparer contrat, facturation, paiement et mise en service ;</li><li>gérer commandes, réservations ou demandes liées au service ;</li><li>respecter les obligations légales, fiscales et comptables.</li></ul>"}, {"title": "4. Bases légales", "body": "<p>Les traitements reposent sur les mesures précontractuelles, l’exécution du contrat, le consentement lorsque nécessaire, l’intérêt légitime de TapCarta à gérer ses demandes, et les obligations légales applicables, conformément au RGPD.</p>"}, {"title": "5. Conservation", "body": "<p>Les données sont conservées pendant la durée nécessaire au traitement de la demande et à la relation contractuelle, puis pendant les durées légales nécessaires, notamment fiscales et comptables.</p>"}, {"title": "6. Destinataires", "body": "<p>Les données ne sont pas revendues. Elles peuvent être transmises uniquement aux prestataires nécessaires : hébergement, paiement, outils techniques, support, facturation ou obligations légales.</p>"}, {"title": "7. Droits", "body": "<p>Les personnes concernées disposent des droits d’accès, rectification, effacement, limitation, portabilité et opposition. Les demandes peuvent être envoyées à contact@tapcarta.com. Une réclamation peut aussi être introduite auprès de l’AEPD.</p>"}, {"title": "8. Sécurité", "body": "<p>TapCarta met en œuvre des mesures raisonnables pour protéger les données contre l’accès non autorisé, la perte, l’altération ou la divulgation.</p>"}, {"title": "9. Cookies", "body": "<p>TapCarta peut utiliser des cookies nécessaires au fonctionnement du site et du service. Les cookies non nécessaires feront l’objet d’une information ou d’un consentement lorsque requis.</p>"}, {"title": "10. Mise à jour", "body": "<p>Cette politique peut être modifiée lorsque TapCarta évolue. La version en vigueur est celle publiée sur le site.</p>"}]}, "es": {"eyebrow": "Datos personales", "title": "Política de <span>privacidad</span>", "intro": "Esta política explica cómo TapCarta recopila y utiliza los datos. La versión española es la versión de referencia.", "sections": [{"title": "1. Responsable del tratamiento", "body": "<p>TapCarta<br>Nombre comercial explotado por: Fabian Pierre J. Jodogne<br>NIE: Y6319821X<br>Dirección: Calle Gades 2 PBJ 2-3 blq B, 29692 Manilva (Málaga), España<br>Email: <a href=\"mailto:contact@tapcarta.com\">contact@tapcarta.com</a></p>"}, {"title": "2. Datos recopilados", "body": "<p>TapCarta puede recopilar: nombre, apellidos, email, teléfono/WhatsApp, idioma preferido, nombre comercial, dirección, ciudad, país, función del solicitante, datos fiscales o de facturación, oferta deseada, necesidades, mensaje libre, información de menú, logotipo y elementos enviados para la puesta en marcha.</p>"}, {"title": "3. Finalidades", "body": "<ul><li>responder a solicitudes y preparar el expediente;</li><li>crear y gestionar el espacio TapCarta;</li><li>preparar contrato, facturación, pago y puesta en servicio;</li><li>gestionar pedidos, reservas o solicitudes vinculadas al servicio;</li><li>cumplir obligaciones legales, fiscales y contables.</li></ul>"}, {"title": "4. Bases jurídicas", "body": "<p>Los tratamientos se basan en medidas precontractuales, ejecución del contrato, consentimiento cuando sea necesario, interés legítimo de TapCarta en gestionar solicitudes, y obligaciones legales aplicables, conforme al RGPD.</p>"}, {"title": "5. Conservación", "body": "<p>Los datos se conservan durante el tiempo necesario para tratar la solicitud y la relación contractual, y posteriormente durante los plazos legales necesarios, especialmente fiscales y contables.</p>"}, {"title": "6. Destinatarios", "body": "<p>Los datos no se venden. Solo pueden comunicarse a proveedores necesarios: alojamiento, pago, herramientas técnicas, soporte, facturación u obligaciones legales.</p>"}, {"title": "7. Derechos", "body": "<p>Las personas interesadas tienen derechos de acceso, rectificación, supresión, limitación, portabilidad y oposición. Las solicitudes pueden enviarse a contact@tapcarta.com. También puede presentarse una reclamación ante la AEPD.</p>"}, {"title": "8. Seguridad", "body": "<p>TapCarta aplica medidas razonables para proteger los datos frente a accesos no autorizados, pérdida, alteración o divulgación.</p>"}, {"title": "9. Cookies", "body": "<p>TapCarta puede utilizar cookies necesarias para el funcionamiento del sitio y del servicio. Las cookies no necesarias serán objeto de información o consentimiento cuando sea requerido.</p>"}, {"title": "10. Actualización", "body": "<p>Esta política puede modificarse cuando TapCarta evolucione. La versión vigente es la publicada en el sitio.</p>"}]}, "en": {"eyebrow": "Personal data", "title": "TapCarta <span>privacy policy</span>", "intro": "This policy explains how TapCarta collects and uses data. Informative version: in case of discrepancy, the Spanish version prevails.", "sections": [{"title": "1. Controller", "body": "<p>TapCarta<br>Nombre comercial explotado por: Fabian Pierre J. Jodogne<br>NIE: Y6319821X<br>Dirección: Calle Gades 2 PBJ 2-3 blq B, 29692 Manilva (Málaga), España<br>Email: <a href=\"mailto:contact@tapcarta.com\">contact@tapcarta.com</a></p>"}, {"title": "2. Data collected", "body": "<p>TapCarta may collect: name, email, phone/WhatsApp, preferred language, trade name, address, city, country, requester role, tax or billing data, selected plan, needs, free message, menu information, logo and materials sent for setup.</p>"}, {"title": "3. Purposes", "body": "<ul><li>reply to requests and prepare the file;</li><li>create and manage the TapCarta space;</li><li>prepare contract, billing, payment and activation;</li><li>manage orders, bookings or service requests;</li><li>comply with legal, tax and accounting obligations.</li></ul>"}, {"title": "4. Legal bases", "body": "<p>Processing is based on pre-contractual measures, contract performance, consent where required, TapCarta’s legitimate interest in managing requests, and applicable legal obligations, in accordance with GDPR.</p>"}, {"title": "5. Retention", "body": "<p>Data is kept for the time necessary to handle the request and contractual relationship, then for legally required periods, especially tax and accounting obligations.</p>"}, {"title": "6. Recipients", "body": "<p>Data is not sold. It may only be shared with necessary providers: hosting, payment, technical tools, support, billing or legal obligations.</p>"}, {"title": "7. Rights", "body": "<p>Data subjects have rights of access, rectification, erasure, restriction, portability and objection. Requests can be sent to contact@tapcarta.com. A complaint may also be filed with the AEPD.</p>"}, {"title": "8. Security", "body": "<p>TapCarta implements reasonable measures to protect data against unauthorised access, loss, alteration or disclosure.</p>"}, {"title": "9. Cookies", "body": "<p>TapCarta may use cookies necessary for the website and service to function. Non-essential cookies will be subject to information or consent where required.</p>"}, {"title": "10. Updates", "body": "<p>This policy may be updated as TapCarta evolves. The current version is the one published on the website.</p>"}]}, "nl": {"eyebrow": "Persoonsgegevens", "title": "Privacybeleid <span>TapCarta</span>", "intro": "Dit beleid legt uit hoe TapCarta gegevens verzamelt en gebruikt. Informatieve versie: bij afwijkingen heeft de Spaanse versie voorrang.", "sections": [{"title": "1. Verwerkingsverantwoordelijke", "body": "<p>TapCarta<br>Nombre comercial explotado por: Fabian Pierre J. Jodogne<br>NIE: Y6319821X<br>Dirección: Calle Gades 2 PBJ 2-3 blq B, 29692 Manilva (Málaga), España<br>Email: <a href=\"mailto:contact@tapcarta.com\">contact@tapcarta.com</a></p>"}, {"title": "2. Verzamelde gegevens", "body": "<p>TapCarta kan verzamelen: naam, e-mail, telefoon/WhatsApp, voorkeurstaal, handelsnaam, adres, stad, land, rol van de aanvrager, fiscale of facturatiegegevens, gekozen pakket, behoeften, vrij bericht, menu-informatie, logo en elementen voor de opstart.</p>"}, {"title": "3. Doeleinden", "body": "<ul><li>vragen beantwoorden en het dossier voorbereiden;</li><li>de TapCarta-ruimte aanmaken en beheren;</li><li>contract, facturatie, betaling en activering voorbereiden;</li><li>bestellingen, reservaties of serviceaanvragen beheren;</li><li>wettelijke, fiscale en boekhoudkundige verplichtingen naleven.</li></ul>"}, {"title": "4. Rechtsgronden", "body": "<p>Verwerking is gebaseerd op precontractuele maatregelen, uitvoering van het contract, toestemming waar nodig, het gerechtvaardigd belang van TapCarta om aanvragen te beheren, en toepasselijke wettelijke verplichtingen, overeenkomstig de AVG/GDPR.</p>"}, {"title": "5. Bewaring", "body": "<p>Gegevens worden bewaard zolang nodig voor de aanvraag en contractuele relatie, daarna gedurende wettelijke termijnen, met name fiscale en boekhoudkundige verplichtingen.</p>"}, {"title": "6. Ontvangers", "body": "<p>Gegevens worden niet verkocht. Ze kunnen enkel gedeeld worden met noodzakelijke dienstverleners: hosting, betaling, technische tools, support, facturatie of wettelijke verplichtingen.</p>"}, {"title": "7. Rechten", "body": "<p>Betrokkenen hebben recht op toegang, verbetering, wissing, beperking, overdraagbaarheid en bezwaar. Aanvragen kunnen naar contact@tapcarta.com. Er kan ook klacht worden ingediend bij de AEPD.</p>"}, {"title": "8. Beveiliging", "body": "<p>TapCarta neemt redelijke maatregelen om gegevens te beschermen tegen ongeoorloofde toegang, verlies, wijziging of bekendmaking.</p>"}, {"title": "9. Cookies", "body": "<p>TapCarta kan noodzakelijke cookies gebruiken voor de werking van de website en dienst. Niet-noodzakelijke cookies worden geïnformeerd of vragen toestemming wanneer vereist.</p>"}, {"title": "10. Updates", "body": "<p>Dit beleid kan worden aangepast wanneer TapCarta evolueert. De geldige versie is die op de website gepubliceerd staat.</p>"}]}};
    const fallbackLang='es';
    function detectLanguage(){const stored=localStorage.getItem('tapcarta_lang'); if(translations[stored]) return stored; const code=(navigator.language||navigator.userLanguage||'').slice(0,2).toLowerCase(); return translations[code]?code:fallbackLang;}
    function renderSections(dict){const content=document.getElementById('content'); content.innerHTML=dict.sections.map(s=>`<article class="card"><h2>${s.title}</h2>${s.body}</article>`).join('');}
    function applyLang(lang){const dict={...common[lang],...translations[lang]}; document.documentElement.lang=lang; document.querySelectorAll('[data-i18n]').forEach(el=>{const key=el.getAttribute('data-i18n'); if(dict[key]) el.innerHTML=dict[key];}); document.querySelectorAll('.lang-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.lang===lang)); renderSections(dict); localStorage.setItem('tapcarta_lang',lang);}
    let activeLang=detectLanguage(); document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{activeLang=btn.dataset.lang;applyLang(activeLang);})); applyLang(activeLang);
  </script>
</body>
