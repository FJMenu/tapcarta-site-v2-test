y:flex;gap:12px;flex-wrap:wrap;margin-top:26px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 18px;border-radius:999px;border:1px solid rgba(255,197,27,.24);text-decoration:none;font-weight:900;color:var(--text);background:rgba(255,255,255,.045)}.btn.primary{background:var(--gold);color:#1b1307;border-color:var(--gold);box-shadow:0 16px 38px rgba(255,197,27,.16)}.grid{display:grid;grid-template-columns:1fr;gap:18px}.card{border:1px solid rgba(255,197,27,.16);background:rgba(255,255,255,.045);border-radius:22px;padding:24px}h2{color:var(--gold);margin:0 0 12px;font-size:22px;letter-spacing:-.02em}p{margin:0 0 12px;color:var(--muted)}ul{margin:0;padding-left:20px;color:var(--muted)}li{margin:6px 0}.note{margin-top:18px;padding:16px;border-radius:18px;border:1px solid rgba(255,197,27,.22);background:rgba(255,197,27,.075);color:#ffe7a3;font-weight:750}.legal-links{display:flex;gap:18px;flex-wrap:wrap}footer{border-top:1px solid rgba(255,197,27,.12);padding:24px 0;color:var(--muted);font-size:14px}.footer-row{display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap}@media(max-width:640px){.nav{align-items:flex-start;flex-direction:column}.lang{justify-content:flex-start}.hero,.card{padding:22px}.btn{width:100%}.footer-row{display:grid}.legal-links{display:grid;gap:10px}}

  <script>

    const common={
      fr:{join:'Je rejoins TapCarta',back:'Retour au site',rights:'Tous droits réservés',legal:'Mentions légales',terms:'Conditions générales',privacy:'Confidentialité'},
      es:{join:'Me uno a TapCarta',back:'Volver al sitio',rights:'Todos los derechos reservados',legal:'Aviso legal',terms:'Condiciones generales',privacy:'Privacidad'},

    };
    const translations = {"fr": {"eyebrow": "Conditions générales", "title": "Conditions générales <span>TapCarta</span>", "intro": "Ces conditions encadrent l’utilisation des services TapCarta. Version informative : en cas de divergence, la version espagnole prévaut.", "sections": [{"title": "1. Objet", "body": "<p>Les présentes Conditions Générales régissent les services proposés par TapCarta aux établissements de restauration : menu digital, QR code durable, site web, réservation, commande ou autres fonctionnalités selon l’offre souscrite.</p>"}, {"title": "2. Identité du prestataire", "body": "<p>TapCarta<br>Nombre comercial explotado por: Fabian Pierre J. Jodogne<br>NIE: Y6319821X<br>Dirección: Calle Gades 2 PBJ 2-3 blq B, 29692 Manilva (Málaga), España<br>Email: <a href=\"mailto:contact@tapcarta.com\">contact@tapcarta.com</a></p>"}, {"title": "3. Acceptation", "body": "<p>La souscription, l’utilisation du service ou la validation d’un dossier TapCarta implique l’acceptation des présentes Conditions Générales. Elles sont mises à disposition de manière permanente, facile, directe et gratuite conformément à l’article 10 de la Ley 34/2002 (LSSI-CE).</p>"}, {"title": "4. Description du service", "body": "<p>TapCarta est un service SaaS évolutif. Les fonctionnalités disponibles varient selon l’offre souscrite : Light, Standard, Plus ou Max. TapCarta peut améliorer, modifier ou ajouter des fonctionnalités si ces évolutions restent cohérentes avec l’offre souscrite.</p>"}, {"title": "5. Obligations du client", "body": "<ul><li>fournir des informations exactes et à jour ;</li><li>être autorisé à engager l’établissement ;</li><li>transmettre les éléments nécessaires au service ;</li><li>ne pas utiliser TapCarta pour un contenu illégal, trompeur ou portant atteinte aux droits de tiers.</li></ul>"}, {"title": "6. Fourniture des éléments", "body": "<p>Le client transmet le menu complet, le logo, les informations de l’établissement et tout contenu utile dans un délai de 10 jours après validation du dossier. À défaut, TapCarta peut activer le service avec les éléments disponibles ou activer automatiquement le service le premier jour du mois suivant la fin du délai de 10 jours, même si toutes les informations n’ont pas été fournies.</p>"}, {"title": "7. Prix, paiement et impayés", "body": "<p>Les services payants sont facturés selon l’offre souscrite. Le paiement est effectué mensuellement, notamment via GoCardless. En cas de retard, TapCarta peut appliquer des frais de gestion de 10 € par mois de retard. TapCarta se réserve aussi le droit de réclamer l’indemnité légale fixe de 40 € pour frais de recouvrement prévue par l’article 8 de la Ley 3/2004, ainsi que les intérêts de retard et coûts supplémentaires dûment justifiés.</p>"}, {"title": "8. Suspension et version Light", "body": "<p>Après deux mois de retard de paiement, TapCarta peut suspendre les fonctionnalités payantes et basculer le service vers la version Light. La version Light contient uniquement une présence minimale : nom, localisation et contact/appel.</p>"}, {"title": "9. Engagement et renouvellement", "body": "<p>Sauf accord contraire, l’engagement est conclu pour 12 mois et renouvelé automatiquement par périodes successives de 12 mois. Le client peut refuser le renouvellement avec un préavis écrit d’au moins 30 jours calendaires avant l’échéance, envoyé à contact@tapcarta.com. La date d’envoi de l’email fait foi.</p>"}, {"title": "10. Responsabilité", "body": "<p>TapCarta agit comme outil technique. Le client reste seul responsable des informations, prix, disponibilités, contenus et obligations propres à son établissement. TapCarta ne répond pas des pertes d’exploitation, erreurs de contenu ou informations inexactes transmises par le client.</p>"}, {"title": "11. Données personnelles", "body": "<p>Les traitements de données sont encadrés par la Politique de confidentialité et sont réalisés conformément au Règlement (UE) 2016/679 (RGPD) et à la Ley Orgánica 3/2018 (LOPDGDD).</p>"}, {"title": "12. Propriété intellectuelle", "body": "<p>TapCarta, son interface, ses éléments visuels, sa structure, son code, son concept et ses contenus restent la propriété de TapCarta ou de leurs titulaires respectifs. Le client dispose uniquement d’un droit d’utilisation dans le cadre du service.</p>"}, {"title": "13. Modification", "body": "<p>TapCarta peut modifier les présentes Conditions Générales. La version applicable est celle publiée sur le site au moment de la souscription ou de l’utilisation du service, sauf disposition contractuelle spécifique.</p>"}, {"title": "14. Droit applicable et juridiction", "body": "<p>Les présentes conditions sont soumises au droit espagnol. Pour tout litige, les parties se soumettent expressément aux Juzgados y Tribunales de Málaga, avec renonciation à tout autre for pouvant leur correspondre.</p>"}]}, "es": {"eyebrow": "Condiciones generales", "title": "Condiciones generales <span>TapCarta</span>", "intro": "Estas condiciones regulan el uso de los servicios TapCarta. La versión española es la versión de referencia.", "sections": [{"title": "1. Objeto", "body": "<p>Las presentes Condiciones Generales regulan los servicios ofrecidos por TapCarta a establecimientos de restauración: menú digital, código QR duradero, sitio web, reservas, pedidos u otras funcionalidades según la oferta contratada.</p>"}, {"title": "2. Identidad del prestador", "body": "<p>TapCarta<br>Nombre comercial explotado por: Fabian Pierre J. Jodogne<br>NIE: Y6319821X<br>Dirección: Calle Gades 2 PBJ 2-3 blq B, 29692 Manilva (Málaga), España<br>Email: <a href=\"mailto:contact@tapcarta.com\">contact@tapcarta.com</a></p>"}, {"title": "3. Aceptación", "body": "<p>La contratación, el uso del servicio o la validación de un expediente TapCarta implica la aceptación de estas Condiciones Generales. Están disponibles de forma permanente, fácil, directa y gratuita conforme al artículo 10 de la Ley 34/2002 (LSSI-CE).</p>"}, {"title": "4. Descripción del servicio", "body": "<p>TapCarta es un servicio SaaS evolutivo. Las funcionalidades disponibles varían según la oferta contratada: Light, Standard, Plus o Max. TapCarta podrá mejorar, modificar o añadir funcionalidades siempre que dichas evoluciones sean coherentes con la oferta contratada.</p>"}, {"title": "5. Obligaciones del cliente", "body": "<ul><li>facilitar información exacta y actualizada;</li><li>estar autorizado para comprometer al establecimiento;</li><li>proporcionar los elementos necesarios para el servicio;</li><li>no utilizar TapCarta para contenidos ilegales, engañosos o que vulneren derechos de terceros.</li></ul>"}, {"title": "6. Suministro de elementos", "body": "<p>El cliente facilitará el menú completo, logotipo, datos del establecimiento y cualquier contenido útil en un plazo de 10 días tras la validación del expediente. En caso contrario, TapCarta podrá activar el servicio con los elementos disponibles o activar automáticamente el servicio el primer día del mes siguiente al final del plazo de 10 días, aunque no se hayan facilitado todos los datos.</p>"}, {"title": "7. Precio, pago e impagos", "body": "<p>Los servicios de pago se facturan según la oferta contratada. El pago se realizará mensualmente, entre otros medios, a través de GoCardless. En caso de retraso, TapCarta podrá aplicar gastos de gestión de 10 € por cada mes de retraso. TapCarta se reserva asimismo el derecho de reclamar la cantidad fija legal de 40 € por costes de cobro prevista en el artículo 8 de la Ley 3/2004, así como intereses de demora y costes adicionales debidamente acreditados.</p>"}, {"title": "8. Suspensión y versión Light", "body": "<p>Tras dos meses de retraso en el pago, TapCarta podrá suspender las funcionalidades de pago y pasar el servicio a la versión Light. La versión Light contiene únicamente una presencia mínima: nombre, localización y contacto/llamada.</p>"}, {"title": "9. Compromiso y renovación", "body": "<p>Salvo acuerdo contrario, el compromiso se establece por 12 meses y se renueva automáticamente por periodos sucesivos de 12 meses. El cliente podrá oponerse a la renovación mediante preaviso escrito de al menos 30 días naturales antes del vencimiento, enviado a contact@tapcarta.com. La fecha de envío del email hará fe.</p>"}, {"title": "10. Responsabilidad", "body": "<p>TapCarta actúa como herramienta técnica. El cliente sigue siendo el único responsable de la información, precios, disponibilidad, contenidos y obligaciones propias de su establecimiento. TapCarta no responde por pérdidas de explotación, errores de contenido o información inexacta facilitada por el cliente.</p>"}, {"title": "11. Datos personales", "body": "<p>El tratamiento de datos se regula en la Política de privacidad y se realiza conforme al Reglamento (UE) 2016/679 (RGPD) y a la Ley Orgánica 3/2018 (LOPDGDD).</p>"}, {"title": "12. Propiedad intelectual", "body": "<p>TapCarta, su interfaz, elementos visuales, estructura, código, concepto y contenidos siguen siendo propiedad de TapCarta o de sus respectivos titulares. El cliente dispone únicamente de un derecho de uso en el marco del servicio.</p>"}, {"title": "13. Modificación", "body": "<p>TapCarta podrá modificar estas Condiciones Generales. La versión aplicable será la publicada en el sitio en el momento de la contratación o uso del servicio, salvo disposición contractual específica.</p>"}, {"title": "14. Ley aplicable y jurisdicción", "body": "<p>Estas condiciones se rigen por la legislación española. Para cualquier controversia, las partes se someten expresamente a los Juzgados y Tribunales de Málaga, con renuncia a cualquier otro fuero que pudiera corresponderles.</p>"}]}, "en": {"eyebrow": "Terms and conditions", "title": "TapCarta <span>terms and conditions</span>", "intro": "These terms govern the use of TapCarta services. Informative version: in case of discrepancy, the Spanish version prevails.", "sections": [{"title": "1. Purpose", "body": "<p>These Terms and Conditions govern the services offered by TapCarta to restaurants: digital menu, durable QR code, website, bookings, orders and other features depending on the subscribed plan.</p>"}, {"title": "2. Provider identity", "body": "<p>TapCarta<br>Nombre comercial explotado por: Fabian Pierre J. Jodogne<br>NIE: Y6319821X<br>Dirección: Calle Gades 2 PBJ 2-3 blq B, 29692 Manilva (Málaga), España<br>Email: <a href=\"mailto:contact@tapcarta.com\">contact@tapcarta.com</a></p>"}, {"title": "3. Acceptance", "body": "<p>Subscription, use of the service or validation of a TapCarta file implies acceptance of these Terms. They are made available in a permanent, easy, direct and free manner in accordance with Article 10 of Spanish Law 34/2002 (LSSI-CE).</p>"}, {"title": "4. Service description", "body": "<p>TapCarta is an evolving SaaS service. Features vary according to the subscribed plan: Light, Standard, Plus or Max. TapCarta may improve, modify or add features as long as they remain consistent with the subscribed plan.</p>"}, {"title": "5. Client obligations", "body": "<ul><li>provide accurate and up-to-date information;</li><li>be authorised to bind the establishment;</li><li>provide the materials required for the service;</li><li>not use TapCarta for illegal, misleading or third-party-infringing content.</li></ul>"}, {"title": "6. Provision of materials", "body": "<p>The client must provide the full menu, logo, establishment information and any useful content within 10 days after file validation. Otherwise, TapCarta may activate the service with available materials or automatically activate the service on the first day of the month following the end of the 10-day period, even if all information has not been provided.</p>"}, {"title": "7. Price, payment and late payment", "body": "<p>Paid services are billed according to the subscribed plan. Payment is made monthly, including through GoCardless. In case of delay, TapCarta may apply a management fee of €10 for each month of delay. TapCarta also reserves the right to claim the legal fixed amount of €40 for recovery costs provided by Article 8 of Spanish Law 3/2004, as well as late payment interest and duly evidenced additional costs.</p>"}, {"title": "8. Suspension and Light version", "body": "<p>After two months of late payment, TapCarta may suspend paid features and switch the service to the Light version. The Light version only includes a minimal presence: name, location and contact/call.</p>"}, {"title": "9. Commitment and renewal", "body": "<p>Unless otherwise agreed, the commitment is for 12 months and renews automatically for successive 12-month periods. The client may refuse renewal by written notice at least 30 calendar days before expiry, sent to contact@tapcarta.com. The sending date of the email shall be proof.</p>"}, {"title": "10. Liability", "body": "<p>TapCarta acts as a technical tool. The client remains solely responsible for the information, prices, availability, content and obligations of its establishment. TapCarta is not liable for business interruption, content errors or inaccurate information provided by the client.</p>"}, {"title": "11. Personal data", "body": "<p>Data processing is governed by the Privacy Policy and carried out in accordance with Regulation (EU) 2016/679 (GDPR) and Spanish Organic Law 3/2018 (LOPDGDD).</p>"}, {"title": "12. Intellectual property", "body": "<p>TapCarta, its interface, visual elements, structure, code, concept and content remain the property of TapCarta or their respective owners. The client only has a right to use the service.</p>"}, {"title": "13. Changes", "body": "<p>TapCarta may modify these Terms. The applicable version is the one published on the website at the time of subscription or use, unless a specific contract provides otherwise.</p>"}, {"title": "14. Governing law and jurisdiction", "body": "<p>These terms are governed by Spanish law. For any dispute, the parties expressly submit to the Courts and Tribunals of Málaga, waiving any other jurisdiction that may apply.</p>"}]}, "nl": {"eyebrow": "Algemene voorwaarden", "title": "Algemene voorwaarden <span>TapCarta</span>", "intro": "Deze voorwaarden regelen het gebruik van TapCarta-diensten. Informatieve versie: bij afwijkingen heeft de Spaanse versie voorrang.", "sections": [{"title": "1. Doel", "body": "<p>Deze Algemene Voorwaarden regelen de diensten die TapCarta aanbiedt aan horecazaken: digitaal menu, duurzame QR-code, website, reservaties, bestellingen en andere functies afhankelijk van het gekozen pakket.</p>"}, {"title": "2. Identiteit van de dienstverlener", "body": "<p>TapCarta<br>Nombre comercial explotado por: Fabian Pierre J. Jodogne<br>NIE: Y6319821X<br>Dirección: Calle Gades 2 PBJ 2-3 blq B, 29692 Manilva (Málaga), España<br>Email: <a href=\"mailto:contact@tapcarta.com\">contact@tapcarta.com</a></p>"}, {"title": "3. Aanvaarding", "body": "<p>Inschrijving, gebruik van de dienst of validatie van een TapCarta-dossier houdt aanvaarding van deze voorwaarden in. Ze worden permanent, eenvoudig, rechtstreeks en gratis ter beschikking gesteld overeenkomstig artikel 10 van de Spaanse Ley 34/2002 (LSSI-CE).</p>"}, {"title": "4. Beschrijving van de dienst", "body": "<p>TapCarta is een evoluerende SaaS-dienst. De beschikbare functies verschillen volgens het gekozen pakket: Light, Standard, Plus of Max. TapCarta kan functies verbeteren, wijzigen of toevoegen zolang ze coherent blijven met het gekozen pakket.</p>"}, {"title": "5. Verplichtingen van de klant", "body": "<ul><li>juiste en actuele informatie bezorgen;</li><li>bevoegd zijn om de zaak te verbinden;</li><li>de nodige elementen voor de dienst bezorgen;</li><li>TapCarta niet gebruiken voor illegale, misleidende of rechten-schendende inhoud.</li></ul>"}, {"title": "6. Aanlevering van gegevens", "body": "<p>De klant bezorgt het volledige menu, logo, gegevens van de zaak en nuttige inhoud binnen 10 dagen na validatie van het dossier. Zo niet kan TapCarta de dienst activeren met de beschikbare gegevens of de dienst automatisch activeren op de eerste dag van de maand na het einde van de termijn van 10 dagen, zelfs indien niet alle gegevens werden aangeleverd.</p>"}, {"title": "7. Prijs, betaling en laattijdige betaling", "body": "<p>Betaalde diensten worden gefactureerd volgens het gekozen pakket. Betaling gebeurt maandelijks, onder meer via GoCardless. Bij vertraging kan TapCarta een beheerskost van €10 per maand vertraging toepassen. TapCarta behoudt zich ook het recht voor om de wettelijke vaste vergoeding van €40 voor invorderingskosten te vorderen overeenkomstig artikel 8 van de Spaanse Ley 3/2004, evenals nalatigheidsinteresten en behoorlijk aangetoonde bijkomende kosten.</p>"}, {"title": "8. Schorsing en Light-versie", "body": "<p>Na twee maanden betalingsachterstand kan TapCarta betalende functies schorsen en de dienst naar de Light-versie omzetten. De Light-versie bevat enkel een minimale aanwezigheid: naam, locatie en contact/bellen.</p>"}, {"title": "9. Verbintenis en verlenging", "body": "<p>Tenzij anders overeengekomen geldt de verbintenis voor 12 maanden en wordt ze automatisch verlengd met opeenvolgende periodes van 12 maanden. De klant kan verlenging weigeren met een schriftelijke opzeg van minstens 30 kalenderdagen vóór de vervaldatum, verzonden naar contact@tapcarta.com. De verzenddatum van de e-mail geldt als bewijs.</p>"}, {"title": "10. Aansprakelijkheid", "body": "<p>TapCarta fungeert als technisch hulpmiddel. De klant blijft als enige verantwoordelijk voor informatie, prijzen, beschikbaarheid, inhoud en verplichtingen van zijn zaak. TapCarta is niet aansprakelijk voor omzetverlies, inhoudsfouten of onjuiste informatie aangeleverd door de klant.</p>"}, {"title": "11. Persoonsgegevens", "body": "<p>Gegevensverwerking wordt geregeld door het Privacybeleid en gebeurt overeenkomstig Verordening (EU) 2016/679 (AVG/GDPR) en de Spaanse Ley Orgánica 3/2018 (LOPDGDD).</p>"}, {"title": "12. Intellectuele eigendom", "body": "<p>TapCarta, haar interface, visuele elementen, structuur, code, concept en inhoud blijven eigendom van TapCarta of hun respectieve houders. De klant krijgt enkel een gebruiksrecht binnen de dienst.</p>"}, {"title": "13. Wijzigingen", "body": "<p>TapCarta kan deze voorwaarden wijzigen. De toepasselijke versie is de versie die op de website gepubliceerd is op het moment van inschrijving of gebruik, tenzij een specifiek contract anders bepaalt.</p>"}, {"title": "14. Toepasselijk recht en rechtbank", "body": "<p>Deze voorwaarden worden beheerst door Spaans recht. Voor elk geschil onderwerpen de partijen zich uitdrukkelijk aan de rechtbanken van Málaga, met afstand van elke andere mogelijke bevoegdheid.</p>"}]}};
    const fallbackLang='es';
    function detectLanguage(){const stored=localStorage.getItem('tapcarta_lang'); if(translations[stored]) return stored; const code=(navigator.language||navigator.userLanguage||'').slice(0,2).toLowerCase(); return translations[code]?code:fallbackLang;}
    function renderSections(dict){const content=document.getElementById('content'); content.innerHTML=dict.sections.map(s=>`<article class="card"><h2>${s.title}</h2>${s.body}</article>`).join('');}
    function applyLang(lang){const dict={...common[lang],...translations[lang]}; document.documentElement.lang=lang; document.querySelectorAll('[data-i18n]').forEach(el=>{const key=el.getAttribute('data-i18n'); if(dict[key]) el.innerHTML=dict[key];}); document.querySelectorAll('.lang-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.lang===lang)); renderSections(dict); localStorage.setItem('tapcarta_lang',lang);}
    let activeLang=detectLanguage(); document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{activeLang=btn.dataset.lang;applyLang(activeLang);})); applyLang(activeLang);
  </script>
</body>
</html>
